name: Update Sports Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/update-data.yml'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: |
          cd server
          echo "📦 Установка зависимостей..."
          npm ci
          echo "✅ Зависимости установлены"
          echo "📋 Установленные пакеты:"
          npm list --depth=0
        continue-on-error: false
      
      - name: Parse and save data
        id: parse
        run: |
          cd server
          echo "🚀 Запуск парсинга..."
          node scripts/parse-and-save-to-github.js
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        continue-on-error: true
      
      - name: Check results
        if: steps.parse.outcome == 'success' || steps.parse.outcome == 'failure'
        run: |
          echo "📊 Проверка результатов..."
          if [ -d "data" ]; then
            echo "✅ Папка data существует"
            ls -la data/
            if [ -f "data/predictions.json" ]; then
              echo "✅ predictions.json существует"
              echo "Размер: $(wc -c < data/predictions.json) bytes"
            else
              echo "❌ predictions.json не найден"
            fi
            if [ -f "data/news.json" ]; then
              echo "✅ news.json существует"
              echo "Размер: $(wc -c < data/news.json) bytes"
            else
              echo "❌ news.json не найден"
            fi
            if [ -f "data/metadata.json" ]; then
              echo "✅ metadata.json существует"
              cat data/metadata.json
            else
              echo "❌ metadata.json не найден"
            fi
          else
            echo "❌ Папка data не существует"
          fi
      
      - name: Commit and push changes
        if: steps.parse.outcome == 'success' || steps.parse.outcome == 'failure'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Проверяем существование файлов перед добавлением
          if [ -d data ]; then
            # Проверяем, что predictions.json не пустой
            if [ -f data/predictions.json ]; then
              PREDICTIONS_SIZE=$(wc -c < data/predictions.json | tr -d ' ')
              if [ "$PREDICTIONS_SIZE" -lt 10 ]; then
                echo "⚠️ predictions.json пустой или слишком маленький ($PREDICTIONS_SIZE bytes), пропускаем обновление"
                git restore data/predictions.json || true
              fi
            fi
            
            git add data/*.json
            
            if ! git diff --staged --quiet; then
              git commit -m "🤖 Auto-update data: $(date +'%Y-%m-%d %H:%M:%S UTC')"
              git push
              echo "✅ Данные обновлены и отправлены в репозиторий"
            else
              echo "ℹ️ Нет изменений для коммита"
            fi
          else
            echo "⚠️ Файлы данных не найдены"
          fi
      
      - name: Summary
        if: always()
        run: |
          echo "## 📊 Результат обновления данных" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.parse.outcome }}" == "success" ]; then
            echo "- ✅ Workflow выполнен успешно" >> $GITHUB_STEP_SUMMARY
            echo "- 📁 Данные сохранены в папку \`data/\`" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 Доступны через raw.githubusercontent.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Ошибка при выполнении workflow" >> $GITHUB_STEP_SUMMARY
            echo "- Проверьте логи выше для деталей" >> $GITHUB_STEP_SUMMARY
            echo "- Статус: ${{ steps.parse.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
